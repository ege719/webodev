<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Başarılı</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .success-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
        }
    </style>
    <!-- 4 Saniye sonra anasayfaya yönlendir -->
    <meta http-equiv="refresh" content="4;url=index.html">
</head>
<body>
    <div class="success-container">
        <div class="text-center">
            <div class="display-1 text-success mb-3">
                <i class="bi bi-check-circle-fill">✓</i>
            </div>
            <h1 class="baslik-stili mb-4">Giriş Başarılı</h1>
            <div class="alert alert-success fs-4 px-5 py-3 shadow-sm" role="alert">
                Hoşgeldiniz <strong id="ogrenciNo"></strong>
            </div>
            <p class="text-muted mt-3">Otomatik olarak ana sayfaya yönlendiriliyorsunuz...</p>
            <a href="index.html" class="btn btn-primary mt-2">Hemen Git</a>
        </div>
    </div>

    <script>
        // URL'den öğrenci numarasını al
        const urlParams = new URLSearchParams(window.location.search);
        const sifre = urlParams.get('sifre');
        if (sifre) {
            document.getElementById('ogrenciNo').textContent = sifre;
        } else {
            document.getElementById('ogrenciNo').textContent = "Öğrenci";
        }
    </script>
</body>
</html>
