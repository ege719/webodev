<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ă–Äźrenci GiriĹźi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
        }
        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: white;
            border: none;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold baslik-stili" style="margin-bottom: 1rem;">Sisteme GiriĹź</h2>
            <p class="text-muted">Ă–Äźrenci e-posta adresiniz ve Ĺźifrenizle giriĹź yapÄ±nÄ±z.</p>
        </div>

        <div id="genelHata" class="alert alert-danger" role="alert" style="display: none;">
            E-posta veya Ĺźifre hatalÄ±! LĂĽtfen bilgilerinizi kontrol ediniz.
        </div>

        <form id="loginForm" onsubmit="event.preventDefault(); loginKontrol();">
            <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Ă–Äźrenci E-posta</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="B251210555@gmail.com">
                <div id="emailHata" class="text-danger small mt-1" style="display: none;"></div>
            </div>

            <div class="mb-4">
                <label for="sifre" class="form-label fw-semibold">Ĺžifre (Ă–Äźrenci No)</label>
                <input type="password" class="form-control" id="sifre" name="sifre" placeholder="Ĺžifrenizi giriniz">
                <div id="sifreHata" class="text-danger small mt-1" style="display: none;"></div>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary py-2">GiriĹź Yap</button>
                <a href="index.html" class="btn btn-outline-secondary py-2">Ana Sayfaya DĂ¶n</a>
            </div>
        </form>
    </div>
</div>

<script>
function loginKontrol() {
    const emailInput = document.getElementById('email');
    const sifreInput = document.getElementById('sifre');
    const emailHata = document.getElementById('emailHata');
    const sifreHata = document.getElementById('sifreHata');
    const genelHata = document.getElementById('genelHata');
    
    let gecerli = true;

    // Hata mesajlarÄ±nÄ± sÄ±fÄ±rla
    emailHata.style.display = 'none';
    sifreHata.style.display = 'none';
    genelHata.style.display = 'none';

    const email = emailInput.value.trim();
    const sifre = sifreInput.value.trim();

    // BoĹź alan kontrolĂĽ
    if (email === "") {
        emailHata.textContent = "E-posta alanÄ± boĹź bÄ±rakÄ±lamaz.";
        emailHata.style.display = 'block';
        gecerli = false;
    } else {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            emailHata.textContent = "LĂĽtfen geĂ§erli bir e-posta adresi giriniz.";
            emailHata.style.display = 'block';
            gecerli = false;
        }
    }

    if (sifre === "") {
        sifreHata.textContent = "Ĺžifre alanÄ± boĹź bÄ±rakÄ±lamaz.";
        sifreHata.style.display = 'block';
        gecerli = false;
    }

    if (gecerli) {
        if (email === "B251210555@gmail.com" && sifre === "B251210555") {
            // BaĹźarÄ±lÄ± giriĹź: Javascript ile baĹźarÄ±lÄ± sayfasÄ±na yĂ¶nlendir
            window.location.href = "basarili.html?sifre=" + encodeURIComponent(sifre);
        } else {
            // BaĹźarÄ±sÄ±z giriĹź
            genelHata.style.display = 'block';
        }
    }
}
</script>

</body>
</html>
